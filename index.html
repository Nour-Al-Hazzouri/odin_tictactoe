<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <header>
        <h1>Tic Tac Toe</h1>
        <h1>Player 1 is X, Player 2 is O!</h1>
    </header>
    <main>
        <div>
            <input id="p1" name="playerOne" required type="text" placeholder="Player 1's Name">
            <input id="p2" name="playerTwo" required type="text" placeholder="Player 2's Name">
            <button class="start-btn">Start</button>
        </div>
        <div class="grid-count">
            <button>yrt</button>
            <button>ytry</button>
            <button>ryy</button>
            <button>yrty</button>
            <button>rtyt</button>
            <button>yrtr</button>
            <button>rytr</button>
            <button>rytr</button>
            <button>trytr</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
